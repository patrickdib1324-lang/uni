# ============================================================
#  DATABASE CONNECTION  (this is how Java connects to PostgreSQL)
# ============================================================

# The JDBC URL = address of the database
spring.datasource.url=jdbc:postgresql://localhost:5432/university

# Login — using the 'postgres' admin user.
# 👉 PUT YOUR POSTGRES PASSWORD HERE (the one from the PostgreSQL install):
spring.datasource.username=postgres
spring.datasource.password=PATRICK1324

# The PostgreSQL driver
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
#  JPA / Hibernate
# ============================================================
# 'validate' = don't change tables, just check they match (we created them via schema.sql)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server runs here
server.port=8080
